<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08080f;color:#e0e0e0;font-family:system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#drop-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed #334;border-radius:12px;margin:24px;cursor:pointer;transition:border-color .2s}
#drop-zone:hover{border-color:#5af}
#drop-zone p{color:#888;font-size:13px;margin-top:8px}
#viewer{display:none;flex-direction:column;height:100vh}
#canvas-wrap{flex:1;position:relative;min-height:0}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;top:10px;left:10px;font-size:11px;color:#7af;background:rgba(0,0,0,.65);padding:8px 10px;border-radius:7px;line-height:1.9;pointer-events:none}
#h-beh{font-size:12px;font-weight:500;min-height:16px;margin-top:2px}
#top-right{position:absolute;top:10px;right:10px;display:flex;gap:6px;align-items:center}
#simba-label{font-size:11px;color:#5af}
#controls{padding:10px 14px;background:#0d0d16;border-top:1px solid #1a1a2e;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
#btn-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
button{background:#1a1a2e;border:1px solid #334;color:#ccc;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px}
button:hover{background:#252540}
button.on{background:#1e3a5f;border-color:#5af;color:#5af}
.cg{display:flex;align-items:center;gap:5px;font-size:12px;color:#888}
.cg input[type=range]{width:65px;accent-color:#5af}
.v{color:#5af;min-width:32px;font-size:12px}
input[type=color]{width:26px;height:22px;border:1px solid #334;border-radius:4px;background:none;cursor:pointer;padding:1px}
#err-banner{display:none;position:absolute;top:10px;left:50%;transform:translateX(-50%);background:#5a1a1a;color:#ffaaaa;padding:7px 16px;border-radius:7px;font-size:12px;border:1px solid #aa3333;z-index:10}
</style>
</head>
<body>

<div id="drop-zone" onclick="document.getElementById('fi').click()">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#5af" stroke-width="1.5">
    <path d="M12 2v12m0 0-3-3m3 3 3-3"/><path d="M3 17v3a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1v-3"/>
  </svg>
  <h2 style="font-size:17px;font-weight:500;color:#aaa;margin-top:10px">Zebrafish DLC 3D Viewer</h2>
  <p>Drop DeepLabCut CSV here, or click to browse</p>
  <p style="color:#445;font-size:11px;margin-top:3px">x_dp_Head … y_dp_Tail3, distance_from_bottom</p>
  <p style="color:#445;font-size:11px;margin-top:2px">Load SimBA behavior CSV after loading DLC</p>
</div>
<input type="file" id="fi"  accept=".csv" style="display:none">
<input type="file" id="sfi" accept=".csv" style="display:none">

<div id="viewer">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="err-banner" id="err-banner"></div>
    <div id="hud">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
        <span style="color:#adf;font-weight:600;font-size:12px" id="h-fishid">Fish: —</span>
        <span id="h-edit-btn" onclick="startEditID()" style="cursor:pointer;color:#5af;font-size:10px;pointer-events:all">✎</span>
        <input id="h-fishid-input" type="text" style="display:none;background:#0d1a2a;border:1px solid #5af;color:#adf;font-size:12px;border-radius:4px;padding:1px 5px;width:110px" onblur="commitID()" onkeydown="if(event.key==='Enter')commitID()">
      </div>
      <div id="h-frame">Frame: —</div>
      <div id="h-time">Time: —</div>
      <div id="h-xy">Head: —</div>
      <div id="h-z">Depth: —</div>
      <div id="h-beh"></div>
    </div>
    <div id="top-right">
      <button onclick="newFile()" style="font-size:11px;padding:5px 10px">⟳ New file</button>
      <button onclick="document.getElementById('sfi').click()" style="font-size:11px;padding:5px 10px">+ SimBA CSV</button>
      <span id="simba-label"></span>
    </div>
  </div>
  <div id="controls">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:12px;color:#888">Frame</span>
      <input type="range" id="timeline" min="0" value="0" step="1" style="flex:1;accent-color:#5af">
      <span id="prog" style="font-size:12px;color:#888">0 / 0</span>
    </div>
    <div id="btn-row">
      <button id="bp" onclick="togglePlay()">▶ Play</button>
      <div class="cg">Speed<input type="range" id="spd" min="0.1" max="20" step="0.1" value="1"><span class="v" id="sv">1.0×</span></div>
      <div class="cg">Conf<input type="range" id="thr" min="0" max="1" step="0.05" value="0.3"><span class="v" id="tv">0.30</span></div>
      <div class="cg">Trace<input type="color" id="tc" value="#00ffaa">
        <button id="tbv" class="on" onclick="toggleTrace()">Show</button>
        <button onclick="clearTrace()">Clear</button>
      </div>
      <button id="vt" class="on" onclick="setView('top')">Top</button>
      <button id="v3" onclick="setView('3d')">3D</button>
      <button id="vs" onclick="setView('side')">Side</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── constants ────────────────────────────────────────────────────────────────
const FPS=30, TANK=560, H=TANK/2;
const PNAMES=['Head','Trunk','Tail1','Tail2','Tail3'];
const PRAD=[11,11,9,7,5];
const PSCALE=[{x:1.05,y:0.88,z:0.88},{x:1.7,y:1.0,z:0.96},{x:1.25,y:0.78,z:0.68},{x:1.0,y:0.52,z:0.44},{x:0.85,y:0.30,z:0.26}];

// ── state ────────────────────────────────────────────────────────────────────
var frames=[], sm=[], N=0, fi=0, playing=false, spd=1, thr=0.3;
var lastT=null, acc=0, lastR=-1;
var rng={}, traceShow=true, tracePts=[], fwdCache=[], simbaData=[];

// three.js
var renderer, scene, topCam, sideCam, orbitCam, cam;
var spheres=[], connLines=[], stripeMeshes=[], dorsalMesh, tailfinMesh, tLine;
var oDrag=false, oLast={x:0,y:0}, oTheta=0.7, oPhi=1.0, oR=TANK*1.6;
var panX=0, panY=0, panZ=0;
var topPanX=0, topPanY=0, sidePanX=0, sidePanY=0;
var isPanning=false, panLast={x:0,y:0};

// ── error banner ─────────────────────────────────────────────────────────────
function showErr(msg){
  var b=document.getElementById('err-banner');
  b.textContent=msg; b.style.display='block';
  clearTimeout(b._t); b._t=setTimeout(function(){b.style.display='none';},5000);
}

// ── CSV parse ────────────────────────────────────────────────────────────────
function parseCSV(txt){
  var lines=txt.split('\n');

  // Find the header row — must contain x_dp_Head
  var hi=-1;
  for(var i=0;i<Math.min(20,lines.length);i++){
    if(lines[i].indexOf('x_dp_Head')>=0){hi=i;break;}
  }
  if(hi===-1){showErr('Could not find header row with x_dp_Head in the CSV.');return[];}

  var cols=lines[hi].split(',');
  var need=['x_dp_Head','y_dp_Head','x_dp_Trunk','y_dp_Trunk',
    'x_dp_Tail1','y_dp_Tail1','x_dp_Tail2','y_dp_Tail2','x_dp_Tail3','y_dp_Tail3',
    'likelihood_Head','likelihood_Trunk','likelihood_Tail1','likelihood_Tail2','likelihood_Tail3',
    'distance_from_bottom','z'];
  var idx={};
  need.forEach(function(k){idx[k]=cols.indexOf(k);});

  // Warn about missing critical columns
  var missing=[];
  ['x_dp_Head','y_dp_Head','x_dp_Trunk','y_dp_Trunk'].forEach(function(k){
    if(idx[k]===-1) missing.push(k);
  });
  if(missing.length) showErr('Warning: missing columns: '+missing.join(', '));

  var out=[];
  for(var i=hi+1;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line) continue;                         // skip blank lines
    var c=line.split(',');
    if(c.length<4) continue;                    // skip malformed rows

    var f={};
    need.forEach(function(k){
      f[k]=idx[k]>=0 ? parseFloat(c[idx[k]]) : NaN;
    });

    // Only keep rows that have at least one valid coordinate
    if(isFinite(f['x_dp_Head'])||isFinite(f['x_dp_Trunk'])||isFinite(f['x_dp_Tail1'])){
      out.push(f);
    }
  }
  if(out.length===0) showErr('CSV parsed but no valid data rows found.');
  return out;
}

function parseSimBA(txt){
  var lines=txt.trim().split('\n'), hi=0;
  for(var i=0;i<Math.min(5,lines.length);i++){
    if(lines[i].indexOf('Attack')>=0||lines[i].indexOf('Freezing')>=0){hi=i;break;}
  }
  var cols=lines[hi].split(',').map(function(c){return c.trim().replace(/"/g,'');});
  var iV=cols.indexOf('V1'), iA=cols.indexOf('Attack'), iP=cols.indexOf('Parallel_swimming'), iF=cols.indexOf('Freezing');
  var out=[];
  for(var i=hi+1;i<lines.length;i++){
    var c=lines[i].split(',');if(c.length<2)continue;
    var row={Attack:iA>=0?parseInt(c[iA]):0, Parallel_swimming:iP>=0?parseInt(c[iP]):0, Freezing:iF>=0?parseInt(c[iF]):0};
    var frameIdx=iV>=0?parseInt(c[iV]):i-1;
    out[frameIdx]=row;
  }
  return out;
}

// ── calibrate ────────────────────────────────────────────────────────────────
function calibrate(raw){
  if(!raw||raw.length===0) return;
  var x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity,z0=Infinity,z1=-Infinity,hasZ=false;
  raw.forEach(function(f){
    if(!f) return;                              // guard against undefined entries
    PNAMES.forEach(function(nm){
      var xv=f['x_dp_'+nm],yv=f['y_dp_'+nm];
      if(isFinite(xv)){x0=Math.min(x0,xv);x1=Math.max(x1,xv);}
      if(isFinite(yv)){y0=Math.min(y0,yv);y1=Math.max(y1,yv);}
    });
    var zv=isFinite(f.distance_from_bottom)?f.distance_from_bottom:f.z;
    if(isFinite(zv)){z0=Math.min(z0,zv);z1=Math.max(z1,zv);hasZ=true;}
  });
  // Fallback if nothing finite found
  if(!isFinite(x0)){x0=0;x1=1;}
  if(!isFinite(y0)){y0=0;y1=1;}
  var span=Math.max(x1-x0,y1-y0)||1;
  var cx=(x0+x1)/2,cy=(y0+y1)/2;
  rng={x0:cx-span/2,x1:cx+span/2,y0:cy-span/2,y1:cy+span/2,span:span,z0:z0,z1:z1,zspan:(z1-z0)||1,hasZ:hasZ};
}

function mx(v){return((v-rng.x0)/rng.span-0.5)*TANK;}
function my(v){return-((v-rng.y0)/rng.span-0.5)*TANK;}
function mz(v){return rng.hasZ?((v-rng.z0)/rng.zspan-0.5)*TANK:0;}
function getZval(f){return isFinite(f.distance_from_bottom)?f.distance_from_bottom:f.z;}
function getPt(f,nm){
  if(!f) return{x:0,y:0,z:0,ok:false};
  var xv=f['x_dp_'+nm],yv=f['y_dp_'+nm],lk=f['likelihood_'+nm];
  var ok=isFinite(xv)&&isFinite(yv)&&(isFinite(lk)?lk>=thr:true);
  return{x:mx(xv),y:my(yv),z:mz(getZval(f)),ok:ok};
}

// ── smooth ───────────────────────────────────────────────────────────────────
function gaussSmooth(raw,W){
  var n=raw.length,sig=Math.max(W/2,1),wts=[];
  for(var d=-W;d<=W;d++)wts.push(Math.exp(-d*d/(2*sig*sig)));
  var keys=[];
  PNAMES.forEach(function(nm){keys.push('x_dp_'+nm);keys.push('y_dp_'+nm);});
  keys.push('distance_from_bottom');keys.push('z');
  return raw.map(function(f,i){
    if(!f) return f;
    var sf=Object.assign({},f);
    keys.forEach(function(k){
      var sum=0,ws=0;
      for(var d=-W;d<=W;d++){
        var j=Math.max(0,Math.min(n-1,i+d));
        var row=raw[j];
        if(!row) return;
        var v=row[k];
        if(isFinite(v)){sum+=v*wts[d+W];ws+=wts[d+W];}
      }
      sf[k]=ws>0?sum/ws:f[k];
    });
    return sf;
  });
}

function buildFwdCache(smData){
  var n=smData.length,rawA=new Float32Array(n);
  for(var i=0;i<n;i++){
    var f=smData[i];
    if(!f){rawA[i]=i>0?rawA[i-1]:0;continue;}
    var hx=f['x_dp_Head'],hy=f['y_dp_Head'],tx=f['x_dp_Trunk'],ty=f['y_dp_Trunk'];
    rawA[i]=(isFinite(hx)&&isFinite(tx))?Math.atan2(-(hy-ty),hx-tx):(i>0?rawA[i-1]:0);
  }
  var unwrap=new Float32Array(n);unwrap[0]=rawA[0];
  for(var i=1;i<n;i++){
    var diff=rawA[i]-unwrap[i-1];
    while(diff>Math.PI)diff-=2*Math.PI;while(diff<-Math.PI)diff+=2*Math.PI;
    unwrap[i]=unwrap[i-1]+diff;
  }
  var W=20,sig=W/2,wts=[];
  for(var d=-W;d<=W;d++)wts.push(Math.exp(-d*d/(2*sig*sig)));
  fwdCache=[];
  for(var i=0;i<n;i++){
    var sum=0,ws=0;
    for(var d=-W;d<=W;d++){
      var j=Math.max(0,Math.min(n-1,i+d));sum+=unwrap[j]*wts[d+W];ws+=wts[d+W];
    }
    var a=sum/ws;
    fwdCache.push(new THREE.Vector3(Math.cos(a),0,Math.sin(a)));
  }
}

// ── ortho cam helper ─────────────────────────────────────────────────────────
function updateOrthoCams(){
  if(!topCam||!sideCam)return;
  var wrap=document.getElementById('canvas-wrap');
  var a=wrap.clientWidth/(wrap.clientHeight||500),hh=H*0.9;
  topCam.left=-hh*a+topPanX;topCam.right=hh*a+topPanX;topCam.top=hh+topPanY;topCam.bottom=-hh+topPanY;topCam.updateProjectionMatrix();
  sideCam.left=-hh*a+sidePanX;sideCam.right=hh*a+sidePanX;sideCam.top=hh+sidePanY;sideCam.bottom=-hh+sidePanY;sideCam.updateProjectionMatrix();
}

// ── scene ────────────────────────────────────────────────────────────────────
function initScene(){
  var canvas=document.getElementById('c');
  renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
  renderer.setClearColor(0x06080f);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  scene=new THREE.Scene();
  scene.add(new THREE.AmbientLight(0xffffff,0.5));
  var dl=new THREE.DirectionalLight(0xaaddff,1.0);dl.position.set(300,500,400);scene.add(dl);
  scene.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(TANK,TANK,TANK)),new THREE.LineBasicMaterial({color:0x224466})));
  var grid=new THREE.GridHelper(TANK,10,0x112233,0x112233);grid.position.y=-H;scene.add(grid);
  scene.add(new THREE.Mesh(new THREE.BoxGeometry(TANK,TANK,TANK),new THREE.MeshBasicMaterial({color:0x001828,transparent:true,opacity:0.12,side:THREE.BackSide})));

  var bodyMat=new THREE.MeshPhongMaterial({color:0xc2d8ea,emissive:0x0a1820,shininess:80});
  var stripeMat=new THREE.MeshPhongMaterial({color:0x0e151c,shininess:10});
  var finMat=new THREE.MeshPhongMaterial({color:0x90b8cc,transparent:true,opacity:0.4,side:THREE.DoubleSide});

  spheres=PNAMES.map(function(_,i){
    var m=new THREE.Mesh(new THREE.SphereGeometry(PRAD[i],16,12),bodyMat.clone());scene.add(m);return m;
  });
  stripeMeshes=[];
  for(var i=0;i<4;i++){var m=new THREE.Mesh(new THREE.CylinderGeometry(11.5,11.5,3,16),stripeMat.clone());scene.add(m);stripeMeshes.push(m);}
  dorsalMesh=new THREE.Mesh(new THREE.PlaneGeometry(44,13),finMat.clone());scene.add(dorsalMesh);
  tailfinMesh=new THREE.Mesh(new THREE.PlaneGeometry(9,24),finMat.clone());scene.add(tailfinMesh);

  connLines=[];
  for(var i=0;i<4;i++){
    var geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(6),3));
    var ln=new THREE.Line(geo,new THREE.LineBasicMaterial({color:0x4499aa,transparent:true,opacity:0.7}));
    scene.add(ln);connLines.push(ln);
  }

  var tgeo=new THREE.BufferGeometry();
  tgeo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(200000*3),3));
  tgeo.setDrawRange(0,0);
  tLine=new THREE.Line(tgeo,new THREE.LineBasicMaterial({color:0x00ffaa,transparent:true,opacity:0.6}));
  scene.add(tLine);

  var hh=H*0.9;
  topCam=new THREE.OrthographicCamera(-hh,hh,hh,-hh,1,10000);topCam.position.set(0,TANK*1.5,0);topCam.lookAt(0,0,0);
  sideCam=new THREE.OrthographicCamera(-hh,hh,hh,-hh,1,10000);sideCam.position.set(0,0,TANK*1.5);sideCam.lookAt(0,0,0);
  orbitCam=new THREE.PerspectiveCamera(50,1,1,10000);
  cam=topCam;
  setupOrbit();resize();
  window.addEventListener('resize',resize);
  renderer.setAnimationLoop(loop);
}

// ── orbit + pan controls ─────────────────────────────────────────────────────
function setupOrbit(){
  var cv=document.getElementById('c');
  cv.addEventListener('mousedown',function(e){
    if(cam===orbitCam){oDrag=e.button===2?'pan':'orbit';oLast={x:e.clientX,y:e.clientY};}
    else if(e.button===0){isPanning=true;panLast={x:e.clientX,y:e.clientY};}
  });
  cv.addEventListener('contextmenu',function(e){e.preventDefault();});
  window.addEventListener('mouseup',function(){oDrag=false;isPanning=false;});
  window.addEventListener('mousemove',function(e){
    var dx=e.clientX-oLast.x,dy=e.clientY-oLast.y;
    if(oDrag==='orbit'){
      oTheta-=dx*0.005;oPhi=Math.max(0.08,Math.min(Math.PI-0.08,oPhi+dy*0.005));oLast={x:e.clientX,y:e.clientY};
    }else if(oDrag==='pan'){
      var ps=oR*0.001,rX=Math.cos(oTheta),rZ=-Math.sin(oTheta);
      panX-=dx*ps*rX;panZ+=dx*ps*rZ;panY-=dy*ps;oLast={x:e.clientX,y:e.clientY};
    }else if(isPanning){
      var wrap=document.getElementById('canvas-wrap');
      var a=wrap.clientWidth/(wrap.clientHeight||500),hh=H*0.9;
      var sx=(hh*a*2)/wrap.clientWidth,sy=(hh*2)/(wrap.clientHeight||500);
      var pdx=e.clientX-panLast.x,pdy=e.clientY-panLast.y;
      if(cam===topCam){topPanX-=pdx*sx;topPanY+=pdy*sy;}
      else{sidePanX-=pdx*sx;sidePanY+=pdy*sy;}
      panLast={x:e.clientX,y:e.clientY};
      updateOrthoCams();
    }
  });
  cv.addEventListener('wheel',function(e){
    if(cam===orbitCam){oR=Math.max(200,oR+e.deltaY*0.8);}
    else{
      var f=1+e.deltaY*0.001;
      if(cam===topCam){topCam.left*=f;topCam.right*=f;topCam.top*=f;topCam.bottom*=f;topCam.updateProjectionMatrix();}
      else{sideCam.left*=f;sideCam.right*=f;sideCam.top*=f;sideCam.bottom*=f;sideCam.updateProjectionMatrix();}
    }
  },{passive:true});
}

// ── per-frame render ─────────────────────────────────────────────────────────
var _qYaw=new THREE.Quaternion(),_axisY=new THREE.Vector3(0,1,0),_axisZ=new THREE.Vector3(0,0,1),_localX=new THREE.Vector3(1,0,0);

function renderFrame(idx){
  var f=sm[idx];
  if(!f) return;                                // guard: skip undefined frames
  var pts=PNAMES.map(function(nm){return getPt(f,nm);});
  var fwd=(fwdCache[idx])?fwdCache[idx].clone():new THREE.Vector3(1,0,0);

  // Force fish to stay horizontal — clamp Y component so it can't go vertical
  fwd.y=0;
  if(fwd.lengthSq()<0.0001) fwd.set(1,0,0);
  fwd.normalize();
  _qYaw.setFromUnitVectors(_localX,fwd);

  pts.forEach(function(p,i){
    spheres[i].visible=p.ok;
    if(p.ok){spheres[i].position.set(p.x,p.y,p.z);spheres[i].quaternion.copy(_qYaw);spheres[i].scale.set(PSCALE[i].x,PSCALE[i].y,PSCALE[i].z);}
  });

  var trunk=pts[1];
  if(trunk.ok){
    var qS=new THREE.Quaternion().setFromUnitVectors(_axisY,fwd);
    var offs=[-15,-5,5,15];
    stripeMeshes.forEach(function(sm2,i){sm2.position.set(trunk.x+fwd.x*offs[i],trunk.y,trunk.z+fwd.z*offs[i]);sm2.quaternion.copy(qS);sm2.visible=true;});
    dorsalMesh.position.set(trunk.x,trunk.y+10,trunk.z);
    var qD=new THREE.Quaternion().setFromUnitVectors(_axisZ,_axisY);qD.premultiply(_qYaw);
    dorsalMesh.quaternion.copy(qD);dorsalMesh.visible=true;
  }else{stripeMeshes.forEach(function(m){m.visible=false;});dorsalMesh.visible=false;}

  var tail=pts[4];
  if(tail.ok){
    tailfinMesh.position.set(tail.x,tail.y,tail.z);
    tailfinMesh.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(_axisZ,fwd));
    tailfinMesh.visible=true;
  }else tailfinMesh.visible=false;

  for(var i=0;i<4;i++){
    var a=pts[i],b=pts[i+1];
    if(a.ok&&b.ok){
      connLines[i].visible=true;
      var ar=connLines[i].geometry.attributes.position.array;
      ar[0]=a.x;ar[1]=a.y;ar[2]=a.z;ar[3]=b.x;ar[4]=b.y;ar[5]=b.z;
      connLines[i].geometry.attributes.position.needsUpdate=true;
    }else connLines[i].visible=false;
  }

  var ref=trunk.ok?trunk:(pts[0].ok?pts[0]:null);
  if(ref&&idx>=tracePts.length){
    tracePts.push([ref.x,ref.y,ref.z]);
    var arr=tLine.geometry.attributes.position.array,n=tracePts.length-1;
    arr[n*3]=ref.x;arr[n*3+1]=ref.y;arr[n*3+2]=ref.z;
    tLine.geometry.attributes.position.needsUpdate=true;
  }
  tLine.geometry.setDrawRange(0,Math.min(idx+1,tracePts.length));

  var hb=document.getElementById('h-beh');
  var beh=simbaData.length>0?simbaData[idx]:null;
  if(beh){
    var label='',color='';
    if(beh.Freezing===1){label='❄ Freezing';color='#44aaff';}
    else if(beh.Parallel_swimming===1){label='↔ Parallel swim';color='#ffaa00';}
    else if(beh.Attack===1){label='⚔ Attack';color='#ff4444';}
    hb.innerHTML=label
      ?'<span style="background:'+color+';color:#000;padding:1px 8px;border-radius:4px;font-weight:600">'+label+'</span>'
      :'<span style="color:#555">No behavior</span>';
  }else hb.innerHTML='';

  var hp=pts[0];
  document.getElementById('h-frame').textContent='Frame: '+idx;
  document.getElementById('h-time').textContent='Time: '+(idx/FPS).toFixed(2)+'s / '+(N/FPS).toFixed(1)+'s';
  document.getElementById('h-xy').textContent=hp.ok?'Head: ('+hp.x.toFixed(0)+', '+hp.y.toFixed(0)+')':'Head: low conf';
  document.getElementById('h-z').textContent=rng.hasZ?'Depth: '+mz(getZval(f)).toFixed(0):'Depth: no data';
}

// ── loop ─────────────────────────────────────────────────────────────────────
function loop(){
  if(cam===orbitCam){
    orbitCam.position.set(panX+oR*Math.sin(oPhi)*Math.sin(oTheta),panY+oR*Math.cos(oPhi),panZ+oR*Math.sin(oPhi)*Math.cos(oTheta));
    orbitCam.lookAt(panX,panY,panZ);
  }
  if(playing&&N>0){
    var now=performance.now();
    if(lastT!==null){acc+=(now-lastT)*spd;var fs=1000/FPS;while(acc>=fs){fi=(fi+1)%N;acc-=fs;}}
    lastT=now;
    document.getElementById('timeline').value=fi;
    document.getElementById('prog').textContent=fi+' / '+N;
  }
  if(fi!==lastR){renderFrame(fi);lastR=fi;}
  renderer.render(scene,cam);
}

function resize(){
  var wrap=document.getElementById('canvas-wrap'),w=wrap.clientWidth,h=wrap.clientHeight||500;
  renderer.setSize(w,h,false);
  orbitCam.aspect=w/h;orbitCam.updateProjectionMatrix();
  updateOrthoCams();
}

// ── file loading ─────────────────────────────────────────────────────────────
function parseFishID(filename){
  // Try to extract an ID like 25-464A, ZF_001, etc. — grab the first token
  // that looks like a fish ID (alphanumeric with dashes/underscores, 3+ chars)
  var base=filename.replace(/\.[^.]+$/,''); // strip extension
  var m=base.match(/([A-Za-z0-9][A-Za-z0-9_\-]{2,})/);
  return m?m[1]:base;
}
function setFishID(id){
  document.getElementById('h-fishid').textContent='Fish: '+id;
}
function startEditID(){
  var cur=document.getElementById('h-fishid').textContent.replace('Fish: ','');
  var inp=document.getElementById('h-fishid-input');
  inp.value=cur; inp.style.display='inline-block'; inp.focus(); inp.select();
  document.getElementById('h-fishid').style.display='none';
  document.getElementById('h-edit-btn').style.display='none';
}
function commitID(){
  var inp=document.getElementById('h-fishid-input');
  setFishID(inp.value||'—');
  inp.style.display='none';
  document.getElementById('h-fishid').style.display='';
  document.getElementById('h-edit-btn').style.display='';
}

function loadFile(file){
  var rd=new FileReader();
  rd.onload=function(e){
    var parsed=parseCSV(e.target.result);
    if(!parsed||parsed.length===0) return;
    setFishID(parseFishID(file.name));      // parseCSV already showed error
    frames=parsed;
    sm=gaussSmooth(frames,4);
    N=frames.length;calibrate(frames);buildFwdCache(sm);
    tracePts=[];fi=0;lastR=-1;lastT=null;acc=0;playing=false;simbaData=[];
    document.getElementById('bp').textContent='▶ Play';
    document.getElementById('timeline').max=N-1;document.getElementById('timeline').value=0;
    document.getElementById('prog').textContent='0 / '+N;
    document.getElementById('simba-label').textContent='';
    document.getElementById('drop-zone').style.display='none';
    document.getElementById('viewer').style.display='flex';
    if(!renderer)initScene();else resetTrace();
  };
  rd.readAsText(file);
}

function resetTrace(){
  tracePts=[];
  var arr=tLine.geometry.attributes.position.array;
  arr.fill(0);tLine.geometry.attributes.position.needsUpdate=true;tLine.geometry.setDrawRange(0,0);
}

// ── UI ────────────────────────────────────────────────────────────────────────
function togglePlay(){playing=!playing;lastT=null;acc=0;document.getElementById('bp').textContent=playing?'⏸ Pause':'▶ Play';}
function newFile(){playing=false;document.getElementById('bp').textContent='▶ Play';document.getElementById('viewer').style.display='none';document.getElementById('drop-zone').style.display='flex';document.getElementById('fi').value='';}
function toggleTrace(){traceShow=!traceShow;tLine.visible=traceShow;var b=document.getElementById('tbv');b.textContent=traceShow?'Show':'Hide';b.classList.toggle('on',traceShow);}
function clearTrace(){if(renderer)resetTrace();}
function setView(v){
  cam=v==='top'?topCam:v==='side'?sideCam:orbitCam;
  if(v==='top'){topPanX=0;topPanY=0;updateOrthoCams();}
  else if(v==='side'){sidePanX=0;sidePanY=0;updateOrthoCams();}
  ['vt','v3','vs'].forEach(function(id){document.getElementById(id).classList.remove('on');});
  document.getElementById(v==='top'?'vt':v==='3d'?'v3':'vs').classList.add('on');
  resize();
}

document.getElementById('fi').addEventListener('change',function(e){if(e.target.files[0])loadFile(e.target.files[0]);});
document.getElementById('sfi').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file)return;
  var rd=new FileReader();
  rd.onload=function(ev){
    simbaData=parseSimBA(ev.target.result);
    document.getElementById('simba-label').textContent=file.name+' ('+simbaData.length+' frames)';
  };
  rd.readAsText(file);
});
var dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.style.borderColor='#5af';});
dz.addEventListener('dragleave',function(){dz.style.borderColor='';});
dz.addEventListener('drop',function(e){e.preventDefault();dz.style.borderColor='';var f=e.dataTransfer.files[0];if(f)loadFile(f);});
document.getElementById('timeline').addEventListener('input',function(e){fi=parseInt(e.target.value);document.getElementById('prog').textContent=fi+' / '+N;});
document.getElementById('spd').addEventListener('input',function(e){spd=parseFloat(e.target.value);document.getElementById('sv').textContent=spd.toFixed(1)+'×';});
document.getElementById('thr').addEventListener('input',function(e){thr=parseFloat(e.target.value);document.getElementById('tv').textContent=thr.toFixed(2);});
document.getElementById('tc').addEventListener('input',function(e){if(tLine)tLine.material.color.set(e.target.value);});
</script>
